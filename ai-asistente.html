<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistente Inteligente | Autoser Vallarta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        autoser: {
                            red: '#ED1C24',
                            black: '#1A1A1A',
                            charcoal: '#252525',
                        }
                    },
                    fontFamily: {
                        headline: ['Montserrat', 'sans-serif'],
                        body: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .chat-container::-webkit-scrollbar {
            width: 6px;
        }

        .chat-container::-webkit-scrollbar-thumb {
            background: rgba(237, 28, 36, 0.5);
            border-radius: 10px;
        }

        .message-bubble {
            max-width: 80%;
            animation: fadeIn 0.3s ease-out forwards;
            line-height: 1.6;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: #ED1C24;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .agent-status-dot {
            width: 12px;
            height: 12px;
            background: #22c55e;
            border-radius: 50%;
            border: 2px solid #1A1A1A;
            box-shadow: 0 0 15px rgba(34, 197, 94, 0.5);
        }

        /* Lobby Animations */
        .lobby-card {
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.02);
        }

        .lobby-card:hover {
            background: rgba(237, 28, 36, 0.05);
            border-color: #ED1C24;
            transform: translateY(-5px);
        }

        .input-island {
            background: #252525;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: border-color 0.3s ease;
        }

        .input-island:focus-within {
            border-color: #ED1C24;
        }
    </style>
</head>

<body class="bg-autoser-black text-white font-body min-h-screen overflow-hidden flex flex-col">

    <!-- Header Profesional -->
    <header class="p-6 glass z-50">
        <div class="max-w-5xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-6">
                <button onclick="showLobby()" class="p-2 hover:bg-white/5 rounded-full transition-colors group">
                    <span class="material-symbols-outlined text-3xl group-hover:text-autoser-red transition-colors">apps</span>
                </button>
                <div class="flex items-center gap-4">
                    <div id="agent-icon-bg" class="w-12 h-12 bg-autoser-red flex items-center justify-center rounded-sm shadow-lg shadow-autoser-red/20">
                        <span id="agent-icon" class="material-symbols-outlined text-white text-3xl">smart_toy</span>
                    </div>
                    <div>
                        <h1 id="agent-name" class="font-headline font-bold text-base tracking-widest uppercase">Asistente Inteligente</h1>
                        <div class="flex items-center gap-2">
                            <div class="agent-status-dot"></div>
                            <span class="text-xs text-gray-400 font-bold uppercase tracking-widest">Agente Online</span>
                        </div>
                    </div>
                </div>
            </div>
            <a href="/" class="hidden md:block">
                <img src="assets/img/logo-autoser.png" alt="Autoser" class="h-8 brightness-110">
            </a>
        </div>
    </header>

    <!-- Área Principal -->
    <main class="flex-grow relative flex flex-col">
        
        <!-- Lobby: Selección de Departamento -->
        <div id="lobby-screen" class="absolute inset-0 z-40 bg-autoser-black/98 backdrop-blur-xl p-8 overflow-y-auto flex flex-col items-center justify-center">
            <div class="max-w-5xl w-full text-center space-y-16 py-12">
                <div class="space-y-6">
                    <span class="text-autoser-red font-headline font-bold text-sm uppercase tracking-[0.6em]">Centro de Atención Digital</span>
                    <h2 class="text-4xl md:text-6xl font-headline font-black uppercase leading-tight tracking-tight">¿EN QUÉ PODEMOS <br><span class="text-autoser-red">AYUDARTE</span> HOY?</h2>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
                    <!-- Ventas Card -->
                    <button onclick="selectAgent('ventas')" class="lobby-card p-10 rounded-sm border border-white/5 text-center space-y-6 group">
                        <div class="w-16 h-16 bg-white/5 rounded-full flex items-center justify-center mx-auto group-hover:bg-autoser-red/10 transition-colors">
                            <span class="material-symbols-outlined text-4xl text-autoser-red">directions_car</span>
                        </div>
                        <div>
                            <h3 class="font-headline font-bold text-sm uppercase tracking-widest mb-3">Seminuevos</h3>
                            <p class="text-xs text-gray-400 leading-relaxed font-medium capitalize">Comprar o valuar un auto</p>
                        </div>
                    </button>

                    <!-- Taller Card -->
                    <button onclick="selectAgent('taller')" class="lobby-card p-10 rounded-sm border border-white/5 text-center space-y-6 group">
                        <div class="w-16 h-16 bg-white/5 rounded-full flex items-center justify-center mx-auto group-hover:bg-autoser-red/10 transition-colors">
                            <span class="material-symbols-outlined text-4xl text-white group-hover:text-autoser-red transition-colors">build</span>
                        </div>
                        <div>
                            <h3 class="font-headline font-bold text-sm uppercase tracking-widest mb-3">Taller</h3>
                            <p class="text-xs text-gray-400 leading-relaxed font-medium capitalize">Mantenimiento y Citas</p>
                        </div>
                    </button>

                    <!-- HyP Card -->
                    <button onclick="selectAgent('hyp')" class="lobby-card p-10 rounded-sm border border-white/5 text-center space-y-6 group">
                        <div class="w-16 h-16 bg-white/5 rounded-full flex items-center justify-center mx-auto group-hover:bg-autoser-red/10 transition-colors">
                            <span class="material-symbols-outlined text-4xl text-white group-hover:text-autoser-red transition-colors">format_paint</span>
                        </div>
                        <div>
                            <h3 class="font-headline font-bold text-sm uppercase tracking-widest mb-3">Hojalatería</h3>
                            <p class="text-xs text-gray-400 leading-relaxed font-medium capitalize">Reparaciones de Carrocería</p>
                        </div>
                    </button>

                    <!-- Refacciones Card -->
                    <button onclick="selectAgent('refacciones')" class="lobby-card p-10 rounded-sm border border-white/5 text-center space-y-6 group">
                        <div class="w-16 h-16 bg-white/5 rounded-full flex items-center justify-center mx-auto group-hover:bg-autoser-red/10 transition-colors">
                            <span class="material-symbols-outlined text-4xl text-white group-hover:text-autoser-red transition-colors">settings_suggest</span>
                        </div>
                        <div>
                            <h3 class="font-headline font-bold text-sm uppercase tracking-widest mb-3">Refacciones</h3>
                            <p class="text-xs text-gray-400 leading-relaxed font-medium capitalize">Piezas y Accesorios</p>
                        </div>
                    </button>
                </div>
            </div>
        </div>

        <!-- Área de Chat -->
        <div id="chat-area" class="flex-grow flex flex-col p-6 space-y-8 overflow-y-auto chat-container h-0">
            <div id="messages-list" class="max-w-4xl mx-auto w-full space-y-8 flex flex-col">
                <!-- Los mensajes se cargan aquí -->
            </div>
            
            <div id="typing-indicator" class="hidden max-w-4xl mx-auto w-full flex items-center gap-3 text-autoser-red px-4">
                <div class="typing-dot"></div>
                <div class="typing-dot" style="animation-delay: 0.2s"></div>
                <div class="typing-dot" style="animation-delay: 0.4s"></div>
                <span class="text-xs uppercase font-bold tracking-widest ml-2">Escribiendo...</span>
            </div>
        </div>

        <!-- Input Island (Centralizada para mejor UX) -->
        <div class="p-8 md:p-12">
            <div class="max-w-3xl mx-auto w-full">
                <div class="input-island flex items-center p-2 rounded-sm pr-4">
                    <textarea id="user-input" rows="1" placeholder="¿En qué puedo ayudarte?" 
                        class="flex-grow bg-transparent border-none px-6 py-4 text-base text-white focus:ring-0 placeholder:text-gray-600 resize-none min-h-[56px] max-h-40"></textarea>
                    <button id="send-btn" class="w-12 h-12 bg-white/5 hover:bg-autoser-red text-white flex items-center justify-center rounded-sm transition-all group disabled:opacity-20">
                        <span class="material-symbols-outlined group-hover:scale-110 transition-transform">send</span>
                    </button>
                </div>
                <p class="text-center text-[10px] text-gray-600 mt-6 uppercase tracking-widest font-bold">Respaldo Automotriz Garantizado por Autoser Vallarta</p>
            </div>
        </div>
    </main>

    <script>
        // Función para formatear el texto enriquecido (Links y Negritas)
        function formatMessage(text) {
            if (!text) return "";
            
            // 1. Escapamos HTML básico
            let formatted = text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;");

            // 2. Aplicamos Negritas (**texto**)
            formatted = formatted.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');

            // 3. Aplicamos Links de Markdown [Texto](URL) y los protegemos
            // Usamos un marcador temporal para que el siguiente paso no los toque
            const markdownLinkRegex = /\[(.*?)\]\((https?:\/\/[^\s)]+)\)/g;
            formatted = formatted.replace(markdownLinkRegex, function(match, label, url) {
                // Estilo de botón premium para links específicos
                return `___LINK_START___<a href="${url}" target="_blank" class="inline-flex items-center gap-2 bg-autoser-red text-white px-5 py-2 rounded-sm font-bold hover:bg-autoser-black transition-all my-2 shadow-lg text-sm"><span class="material-symbols-outlined text-sm">open_in_new</span> ${label}</a>___LINK_END___`;
            });

            // 4. Limpiamos URLs sueltas (Fuerza Bruta compatible con Safari)
            // Dividimos el texto para no tocar lo que ya marcamos como link protegido
            const parts = formatted.split(/(___LINK_START___.*?___LINK_END___)/);
            
            const processedParts = parts.map(part => {
                if (part.startsWith('___LINK_START___')) {
                    // Restauramos el link protegido quitando las marcas
                    return part.replace('___LINK_START___', '').replace('___LINK_END___', '');
                } else {
                    // En texto plano, buscamos cualquier URL y la convertimos en botón
                    const rawUrlRegex = /(https?:\/\/[^\s)]+)/g;
                    return part.replace(rawUrlRegex, function(url) {
                        const cleanUrl = url.replace(/[.,;]$/, "");
                        const isWA = cleanUrl.includes('wa.me');
                        
                        if (isWA) {
                            return `<a href="${cleanUrl}" target="_blank" class="inline-flex items-center gap-2 bg-green-600 text-white px-5 py-2 rounded-sm font-bold hover:bg-green-700 transition-all my-2 shadow-md text-sm"><span class="material-symbols-outlined text-sm">chat</span> CONTACTAR ASESOR</a>`;
                        } else {
                            return `<a href="${cleanUrl}" target="_blank" class="inline-flex items-center gap-2 bg-autoser-red/10 text-autoser-red px-5 py-2 rounded-sm font-bold hover:bg-autoser-red hover:text-white transition-all my-2 border border-autoser-red/20 text-sm"><span class="material-symbols-outlined text-sm">visibility</span> VER DETALLES</a>`;
                        }
                    });
                }
            });

            return processedParts.join('');
        }

        // Configuración de Agentes (Opción A)
        const CONFIG = {
            ventas: {
                name: "Especialista Ventas",
                icon: "directions_car",
                color: "#ED1C24",
                webhook: "https://n8n.orbys.one/webhook/1f275daf-907f-4021-8716-a95ae1e8f32f/chat",
                welcome: "Hola, soy el Especialista en Seminuevos de Autoser. ¿Buscas un modelo en particular o te gustaría valuar tu auto actual?"
            },
            taller: {
                name: "Ingeniero Servicio",
                icon: "build",
                color: "#2A4B8D",
                webhook: "https://n8n.tu-server.com/webhook/taller", // Reemplazar con real
                welcome: "Bienvenido a Servicio Técnico. ¿Qué mantenimiento necesita tu unidad hoy?"
            },
            hyp: {
                name: "Consultor de Pintura",
                icon: "format_paint",
                color: "#F39C12",
                webhook: "https://n8n.tu-server.com/webhook/hyp", // Reemplazar con real
                welcome: "Hola, soy experto en Hojalatería y Pintura. ¿Quieres enviarme una foto de algún golpe para cotizar?"
            },
            refacciones: {
                name: "Gestor Refacciones",
                icon: "settings_suggest",
                color: "#607D8B",
                webhook: "https://n8n.tu-server.com/webhook/refacciones", // Reemplazar con real
                welcome: "Área de Refacciones lista. ¿Buscas alguna pieza original para tu Jeep o RAM?"
            }
        };

        let currentAgent = null;
        let currentSessionId = null;

        // Elementos DOM
        const lobby = document.getElementById('lobby-screen');
        const inputField = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const messagesList = document.getElementById('messages-list');
        const typingIndicator = document.getElementById('typing-indicator');

        // Selección de Agente
        function selectAgent(type) {
            const agent = CONFIG[type];
            currentAgent = agent;
            
            // Generamos un ID de sesión ÚNICO para esta conversación específico para este agente
            currentSessionId = "autoser-" + type + "-" + Math.random().toString(36).substring(7);

            // Transición visual
            lobby.classList.add('hidden');
            document.getElementById('agent-name').innerText = agent.name;
            document.getElementById('agent-icon').innerText = agent.icon;
            document.getElementById('agent-icon-bg').style.backgroundColor = agent.color;
            
            // Limpiar y Dar Bienvenida
            messagesList.innerHTML = `<div class="text-center mb-6"><span class="text-[9px] text-gray-600 bg-white/5 px-4 py-1 rounded-full uppercase tracking-widest">Hablando con ${agent.name}</span></div>`;
            appendMessage('bot', agent.welcome);
        }

        function showLobby() {
            lobby.classList.remove('hidden');
        }

        // Manejo de Mensajes
        function appendMessage(role, text) {
            const div = document.createElement('div');
            div.className = `message-bubble ${role === 'user' 
                ? 'self-end bg-autoser-red text-white font-bold' 
                : 'self-start bg-autoser-charcoal text-gray-100 border border-white/5 shadow-2xl'} 
                px-8 py-5 rounded-sm text-base mb-6`;
            
            // Usamos la función de formateo para procesar links y negritas
            div.innerHTML = formatMessage(text);
            messagesList.appendChild(div);
            
            const chatArea = document.getElementById('chat-area');
            chatArea.scrollTo({ top: chatArea.scrollHeight, behavior: 'smooth' });
        }

        async function sendMessage() {
            const text = inputField.value.trim();
            if (!text || !currentAgent) return;

            appendMessage('user', text);
            inputField.value = '';
            inputField.style.height = 'auto';

            typingIndicator.classList.remove('hidden');
            
            try {
                // n8n suele esperar 'chatInput' en sus nodos de AI Chat
                const response = await fetch(currentAgent.webhook, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ 
                        chatInput: text, 
                        sessionId: currentSessionId, // Ahora es persistente
                        agent: currentAgent.name 
                    })
                });
                
                if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);

                const data = await response.json();
                
                // n8n puede devolver la respuesta en 'output', 'text' o 'response'
                const botResponse = data.output || data.text || data.response || (Array.isArray(data) ? data[0].output : null);
                
                if (botResponse) {
                    appendMessage('bot', botResponse);
                } else {
                    throw new Error("Formato de respuesta desconocido");
                }

            } catch (error) {
                console.error("Detalle del error:", error);
                
                // Si estamos en local (file://), avisamos claramente del CORS
                if (window.location.protocol === 'file:') {
                    appendMessage('bot', "⚠️ ERROR DE SEGURIDAD (CORS): El navegador bloquea la conexión porque estás abriendo el archivo localmente. Intenta subirlo a un servidor o usar la terminal para correrlo.");
                } else {
                    appendMessage('bot', "Hubo un problema al conectar con el agente. Por favor, verifica que el webhook esté activo en n8n.");
                }
            } finally {
                typingIndicator.classList.add('hidden');
                const chatArea = document.getElementById('chat-area');
                chatArea.scrollTo({ top: chatArea.scrollHeight, behavior: 'smooth' });
            }
        }

        // Listeners
        sendBtn.addEventListener('click', sendMessage);
        inputField.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Auto-expand textarea
        inputField.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        // DETECCIÓN AUTOMÁTICA POR URL (Para fase real)
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const forceAgent = urlParams.get('agente');
            if (forceAgent && CONFIG[forceAgent]) {
                selectAgent(forceAgent);
            }
        });
    </script>
</body>

</html>
