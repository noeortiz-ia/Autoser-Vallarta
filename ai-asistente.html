    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        autoser: {

    <style>
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .chat-container::-webkit-scrollbar {
            width: 6px;
        }

        .chat-container::-webkit-scrollbar-thumb {
            background: rgba(237, 28, 36, 0.5);
            border-radius: 10px;
        }

        .message-bubble {
            max-width: 92%;
            animation: fadeIn 0.3s ease-out forwards;
            line-height: 1.5;
        }

        @media (min-width: 768px) {
            .message-bubble {
                max-width: 80%;
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: #ED1C24;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .agent-status-dot {
            width: 12px;
            height: 12px;
            background: #22c55e;
            border-radius: 50%;
            border: 2px solid #1A1A1A;
            box-shadow: 0 0 15px rgba(34, 197, 94, 0.5);

        /* Lobby Animations */
        .lobby-card {
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.02);
        }

        .lobby-card:hover {
            background: rgba(237, 28, 36, 0.05);
            border-color: #ED1C24;
            transform: translateY(-5px);

        .input-island {
            background: #252525;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: border-color 0.3s ease;
        }

        .input-island:focus-within {
            border-color: #ED1C24;
        }
    </style>
</head>

    <script>
        // Función para formatear el texto enriquecido (Links y Negritas)
        function formatMessage(text) {
            if (!text) return "";
            
            // 1. Escapamos HTML básico
            let formatted = text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;");

            // 2. Aplicamos Negritas (**texto**)
            formatted = formatted.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');

            // 3. Aplicamos Links de Markdown [Texto](URL) y los protegemos
            const markdownLinkRegex = /\[(.*?)\]\((https?:\/\/[^\s)]+)\)/g;
            formatted = formatted.replace(markdownLinkRegex, function(match, label, url) {
                const isWA = url.includes('wa.me');
                let displayLabel = label;
                
                // Si el label es una URL, lo cambiamos por algo legible
                if (label.startsWith('http') || label.includes('wa.me')) {
                    if (isWA) {
                        displayLabel = i18n.currentLang === 'en' ? 'CONTACT ADVISOR' : 'CONTACTAR ASESOR';
                    } else {
                        displayLabel = i18n.currentLang === 'en' ? 'VIEW DETAILS' : 'VER DETALLES';
                    }
                }

                const btnClass = isWA ? 'bg-green-600 shadow-green-900/20' : 'bg-autoser-red shadow-autoser-red/20';
                const icon = isWA ? 'chat' : 'open_in_new';
                
                return `___LINK_START___<a href="${url}" target="_blank" class="inline-flex items-center gap-2 ${btnClass} text-white px-5 py-2 rounded-sm font-bold hover:scale-105 transition-all my-2 shadow-lg text-sm"><span class="material-symbols-outlined text-sm">${icon}</span> ${displayLabel}</a>___LINK_END___`;
            });

            // 4. Limpiamos URLs sueltas (Fuerza Bruta compatible con Safari)
            const parts = formatted.split(/(___LINK_START___.*?___LINK_END___)/);
            
            const processedParts = parts.map(part => {
                if (part.startsWith('___LINK_START___')) {
                    return part.replace('___LINK_START___', '').replace('___LINK_END___', '');
                } else {
                    const rawUrlRegex = /(https?:\/\/[^\s<>]+)/g;
                    return part.replace(rawUrlRegex, function(url) {
                        let cleanUrl = url.replace(/[.,;!]$/, "");
                        const openCount = (cleanUrl.match(/\(/g) || []).length;
                        const closeCount = (cleanUrl.match(/\)/g) || []).length;
                        if (closeCount > openCount) {
                            cleanUrl = cleanUrl.substring(0, cleanUrl.lastIndexOf(')'));
                        }

                        const isWA = cleanUrl.includes('wa.me');
                        let displayLabel = isWA 
                            ? (i18n.currentLang === 'en' ? 'CONTACT ADVISOR' : 'CONTACTAR ASESOR')
                            : (i18n.currentLang === 'en' ? 'VIEW DETAILS' : 'VER DETALLES');
                        
                        const btnClass = isWA ? 'bg-green-600 shadow-green-900/20' : 'bg-autoser-red shadow-autoser-red/20';
                        const icon = isWA ? 'chat' : 'open_in_new';

                        return `<a href="${cleanUrl}" target="_blank" class="inline-flex items-center gap-2 ${btnClass} text-white px-5 py-2 rounded-sm font-bold hover:scale-105 transition-all my-2 shadow-lg text-sm"><span class="material-symbols-outlined text-sm">${icon}</span> ${displayLabel}</a>`;
                    });
                }
            });

            return processedParts.join('');
        }

        // Configuración de Agentes
        const CONFIG = {
            ventas: {
                name: "Asesor de Seminuevos",
                name_en: "Pre-owned Advisor",
                icon: "directions_car",
                color: "#ED1C24",
                webhook: "https://n8n.orbys.one/webhook/1f275daf-907f-4021-8716-a95ae1e8f32f/chat",
                welcome: "Hola, soy tu Asesor de Seminuevos Autoser. ¿Buscas un modelo en particular o te gustaría valuar tu auto actual?",
                welcome_en: "Hello, I am your Autoser Pre-owned Advisor. Are you looking for a specific model or would you like to value your current car?",
                suggestions: [
                    { es: "Quiero comprar un auto", en: "I want to buy a car" },
                    { es: "Quiero vender mi auto", en: "I want to sell my car" },
                    { es: "Ver inventario disponible", en: "View inventory" }
                ]
            },
            taller: {
                name: "Asesor de Servicio",
                name_en: "Service Advisor",
                icon: "build",
                color: "#2A4B8D",
                webhook: "https://n8n.orbys.one/webhook/69d809ac-2e54-4bf2-8e5e-dde13c2b4fcd/chat",
                welcome: "Bienvenido a Servicio Técnico, soy tu Asesor de Servicio. ¿Qué mantenimiento necesita tu unidad hoy?",
                welcome_en: "Welcome to Technical Service, I am your Service Advisor. What maintenance does your unit need today?",
                suggestions: [
                    { es: "Agendar servicio", en: "Schedule service" },
                    { es: "Horarios de atención", en: "Business hours" },
                    { es: "Ubicación del taller", en: "Workshop location" }
                ]
            },
            hyp: {
                name: "Asesor de Hojalatería y Pintura",
                name_en: "Body & Paint Advisor",
                icon: "format_paint",
                color: "#F39C12",
                webhook: "https://n8n.orbys.one/webhook/a6636974-8e82-471a-b28e-e8be0beda63f/chat", 
                welcome: "Hola, soy tu Asesor de Hojalatería y Pintura. ¿Quieres enviarme una foto de algún golpe para cotizar?",
                welcome_en: "Hello, I'm your Body & Paint Advisor. Would you like to send me a photo of a dent for a quote?",
                suggestions: [
                    { es: "Cotizar reparación", en: "Quote repair" },
                    { es: "Estatus de mi auto", en: "Car status" },
                    { es: "Cita para presupuesto", en: "Quote appointment" }
                ]
            },
            refacciones: {
                name: "Asesor de Refacciones",
                name_en: "Parts Advisor",
                icon: "settings_suggest",
                color: "#607D8B",
                webhook: "https://n8n.orbys.one/webhook/c1814063-2972-4a91-9407-57d0ddd03f99/chat",
                welcome: "Área de Refacciones lista, soy tu Asesor de Refacciones. ¿Buscas alguna pieza original para tu Jeep o RAM?",
                welcome_en: "Parts Area ready, I am your Parts Advisor. Are you looking for an original part for your Jeep or RAM?",
                suggestions: [
                    { es: "Cotizar refacción", en: "Quote part" },
                    { es: "Accesorios originales", en: "Original accessories" },
                    { es: "Precios de llantas", en: "Tire prices" }
                ]
            }
        };

        let currentAgent = null;
        let currentSessionId = null;

        // --- LÓGICA DE PERSISTENCIA POR AGENTE (Multi-Silo) ---
        function saveConversation() {
            if (!currentAgent) return;
            // Usamos un sufijo basado en el tipo de agente para aislar las memorias
            const agentType = localStorage.getItem('last_agent_type');
            if (!agentType) return;

            const history = Array.from(messagesList.children).map(msg => ({
                className: msg.className,
                innerHTML: msg.innerHTML
            }));

            localStorage.setItem(`autoser_history_${agentType}`, JSON.stringify(history));
            localStorage.setItem(`autoser_session_${agentType}`, currentSessionId);
            localStorage.setItem('autoser_active_agent', agentType);
        }

        function loadAgentState(agentType) {
            const history = JSON.parse(localStorage.getItem(`autoser_history_${agentType}`));
            const sessionId = localStorage.getItem(`autoser_session_${agentType}`);

            if (history && sessionId) {
                currentSessionId = sessionId;
                currentAgent = CONFIG[agentType];
                
                // Mostrar UI del Agente
                lobby.classList.add('hidden');
                document.getElementById('agent-name').innerText = i18n.currentLang === 'en' ? currentAgent.name_en : currentAgent.name;
                document.getElementById('agent-icon').innerText = currentAgent.icon;
                document.getElementById('agent-icon-bg').style.backgroundColor = currentAgent.color;

                // Restaurar Mensajes
                messagesList.innerHTML = '';
                history.forEach(msgData => {
                    const div = document.createElement('div');
                    div.className = msgData.className;
                    div.innerHTML = msgData.innerHTML;
                    messagesList.appendChild(div);
                });

                const chatArea = document.getElementById('chat-area');
                chatArea.scrollTop = chatArea.scrollHeight;
                return true;
            }
            return false;
        }

        function loadAppState() {
            // Al cargar la app, intentamos restaurar el ÚLTIMO agente activo si existía
            const lastActive = localStorage.getItem('autoser_active_agent');
            if (lastActive && CONFIG[lastActive]) {
                return loadAgentState(lastActive);
            }
            return false;
        }

        const resetConversation = () => {
            const agentType = localStorage.getItem('last_agent_type');
            if (!agentType) return;

            if (confirm(`¿Quieres borrar la conversación actual con ${CONFIG[agentType].name}?`)) {
                localStorage.removeItem(`autoser_history_${agentType}`);
                localStorage.removeItem(`autoser_session_${agentType}`);
                localStorage.removeItem('autoser_active_agent');
                location.reload();
            }
        };

        // Elementos DOM
        const lobby = document.getElementById('lobby-screen');
        const inputField = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const messagesList = document.getElementById('messages-list');
        const typingIndicator = document.getElementById('typing-indicator');

        // Selección de Agente
        function selectAgent(type) {
            const agent = CONFIG[type];
            localStorage.setItem('last_agent_type', type);
            
            // 1. Intentamos cargar si este agente ya tenía historia
            if (loadAgentState(type)) {
                renderSuggestions();
                return; 
            }

            // 2. Si no hay historia, iniciamos de cero para este agente
            currentAgent = agent;
            currentSessionId = "autoser-" + type + "-" + Math.random().toString(36).substring(7);
            
            // Transición visual
            lobby.classList.add('hidden');
            document.getElementById('agent-name').innerText = i18n.currentLang === 'en' ? agent.name_en : agent.name;
            document.getElementById('agent-icon').innerText = agent.icon;
            document.getElementById('agent-icon-bg').style.backgroundColor = agent.color;

            // Limpiar área de mensajes y dar Bienvenida
            const startMsg = i18n.currentLang === 'en' ? `Starting consultation with ${agent.name_en}` : `Iniciando consulta con ${agent.name}`;
            messagesList.innerHTML = `<div class="text-center mb-6"><span class="text-[9px] text-gray-600 bg-white/5 px-4 py-1 rounded-full uppercase tracking-widest">${startMsg}</span></div>`;
            appendMessage('bot', i18n.currentLang === 'en' ? agent.welcome_en : agent.welcome);
            
            renderSuggestions();
            saveConversation();
        }

        function renderSuggestions() {
            const container = document.getElementById('suggestions-container');
            container.innerHTML = '';
            
            if (currentAgent && currentAgent.suggestions) {
                currentAgent.suggestions.forEach(sug => {
                    const text = i18n.currentLang === 'en' ? sug.en : sug.es;
                    const btn = document.createElement('button');
                    btn.className = "bg-white/5 hover:bg-autoser-red border border-white/10 hover:border-autoser-red text-gray-300 hover:text-white px-4 py-2 rounded-full text-[10px] md:text-xs font-bold uppercase tracking-widest transition-all duration-300 transform hover:-translate-y-1 shadow-lg";
                    btn.innerText = text;
                    btn.onclick = () => {
                        inputField.value = text;
                        sendMessage();
                    };
                    container.appendChild(btn);
                });
            }
        }

        function showLobby() {
            localStorage.removeItem('autoser_active_agent'); // Al volver al lobby, no hay agente "activo"
            lobby.classList.remove('hidden');
        }

        // Manejo de Mensajes
        function appendMessage(role, text) {
            const div = document.createElement('div');
            div.className = `message-bubble ${role === 'user' 
                ? 'self-end bg-autoser-red text-white font-bold' 
                : 'self-start bg-autoser-charcoal text-gray-100 border border-white/5 shadow-2xl'} 
                px-8 py-5 rounded-sm text-base mb-6`;
            
            div.innerHTML = formatMessage(text);
            messagesList.appendChild(div);
            
            const chatArea = document.getElementById('chat-area');
            chatArea.scrollTo({ top: chatArea.scrollHeight, behavior: 'smooth' });
            
            // Guardar historial después de cada mensaje
            saveConversation();
        }

        async function sendMessage() {
            const text = inputField.value.trim();
            if (!text || !currentAgent) return;

            appendMessage('user', text);
            inputField.value = '';
            inputField.style.height = 'auto';

            // Hide suggestions while processing
            document.getElementById('suggestions-container').classList.add('opacity-0', 'pointer-events-none');

            typingIndicator.classList.remove('hidden');
            
            try {
                const response = await fetch(currentAgent.webhook, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ 
                        chatInput: text, 
                        sessionId: currentSessionId,
                        agent: currentAgent.name 
                    })
                });
                
                const data = await response.json();
                const botResponse = data.output || data.text || data.response || (Array.isArray(data) ? data[0].output : null);
                
                if (botResponse) {
                    appendMessage('bot', botResponse);
                } else {
                    appendMessage('bot', "Recibí una respuesta pero el formato no es compatible. Por favor, reporta este detalle al administrador.");
                }

            } catch (error) {
                console.error("Error de conexión:", error);
                appendMessage('bot', "Lo siento, no puedo conectar con el servidor en este momento. Por favor, intenta de nuevo más tarde o contacta directamente a la sucursal.");
            } finally {
                typingIndicator.classList.add('hidden');
                // Show suggestions again
                document.getElementById('suggestions-container').classList.remove('opacity-0', 'pointer-events-none');
                
                const chatArea = document.getElementById('chat-area');
                chatArea.scrollTo({ top: chatArea.scrollHeight, behavior: 'smooth' });
            }
        }

        // Listeners
        sendBtn.addEventListener('click', sendMessage);
        inputField.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Auto-expand textarea
        inputField.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        // --- INICIALIZACIÓN ---
        document.addEventListener('DOMContentLoaded', () => {
            // Intentamos restaurar la sesión completa (Agente + Historial)
            if (!loadAppState()) {
                // Si no hay nada, mostramos el lobby
                lobby.classList.remove('hidden');
                
                const urlParams = new URLSearchParams(window.location.search);
                const forceAgent = urlParams.get('agente');
                if (forceAgent && CONFIG[forceAgent]) {
                    selectAgent(forceAgent);
                }
            }
        });
    </script>
</body>

</html>
